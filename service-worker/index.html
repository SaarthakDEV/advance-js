<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    max-width:450px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    color:#ff6b6b;
    margin-bottom:10px;
}

p{
    color:#555;
    line-height:1.6;
}

.button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#4a90e2;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>You are Offline</h1>
    <p>
        It looks like you don’t have an internet connection right now.
        However, you can still access some previously loaded data that
        has been stored locally.
    </p>

    <p>Please check your connection and try again.</p>

    <div id="api-data"></div>

    <button class="button" onclick="location.reload()">Retry</button>
</div>
    <script src="index.js"></script>
    <script>
const container = document.getElementById("api-data");

fetch("https://dummyjson.com/test")
  .then(resp => resp.json())
  .then(data => {
      container.innerHTML = JSON.stringify(data, null, 2);
  })
  .catch(err => {
      container.innerHTML = "Failed to load API data.";
      console.error(err);
  });
</script>
</body>
</html>
